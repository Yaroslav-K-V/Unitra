repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: local
    hooks:
      - id: unitra-check
        name: unitra check
        entry: python -m src.cli check
        language: system
        pass_filenames: false
