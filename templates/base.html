<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Unitra{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/favicon.ico">
    <script src="/static/scripts/theme.js"></script>
    <script src="/static/scripts/brand-bubble.js"></script>
    <script src="/static/scripts/window-controls.js"></script>
    <script src="/static/scripts/workspace-shared.js"></script>
    <style>
        :root {
{{ ui_css_vars|indent(12, true) }}
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body data-show-hints="{{ 'true' if show_hints else 'false' }}">
    <div class="app-shell">
        <header class="app-topbar">
            <div class="app-topbar-inner">
                <a href="/" class="app-brand">
                    <span class="brand-mark" aria-hidden="true">
                        <span class="brand-mark-glow"></span>
                        <img src="/static/favicon/favicon.svg" width="26" height="26" alt="Unitra">
                    </span>
                    <span class="app-brand-copy">
                        <span class="app-brand-name">Unitra</span>
                        <span class="app-brand-tag">Local-first Python test tool</span>
                    </span>
                    <span class="brand-bubble" data-bubble-context="header" role="presentation"></span>
                </a>

                <nav class="app-nav" aria-label="Primary">
                    <a href="/" class="app-nav-link {% if active_page == 'home' %}active{% endif %}">Home</a>
                    <a href="/dashboard" class="app-nav-link {% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
                    <a href="/quick" class="app-nav-link {% if active_page == 'quick' %}active{% endif %}">Quick</a>
                    <a href="/workspace" class="app-nav-link {% if active_page == 'workspace' %}active{% endif %}">Workspace</a>
                    <a href="/info" class="app-nav-link {% if active_page == 'info' %}active{% endif %}">Info</a>
                    <a href="/settings" class="app-nav-link {% if active_page == 'settings' %}active{% endif %}">Settings</a>
                </nav>

                <div class="app-utilities">
                    <button id="theme-toggle" class="utility-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Switch to dark theme" aria-pressed="false">◐</button>
                    <button class="utility-btn" onclick="maximizeAppWindow()" title="Maximize window" aria-label="Maximize window">
                        <svg class="ui-icon ui-icon-sm" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M6 6.75H18V17.25H6V6.75Z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <button class="utility-btn" onclick="toggleAppFullscreen()" title="Toggle fullscreen" aria-label="Toggle fullscreen">
                        <svg class="ui-icon ui-icon-sm" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M8.25 3.75H4.5V7.5M15.75 3.75H19.5V7.5M8.25 20.25H4.5V16.5M19.5 16.5V20.25H15.75" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <div class="page-content">
            <div class="page-shell">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
