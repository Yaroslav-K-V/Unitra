<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Unitra{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/favicon.ico">
    <script src="/static/scripts/theme.js"></script>
</head>
<body>
    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">◐</button>

    <aside class="sidebar">
        <a href="/" class="sidebar-logo">
            <img src="/static/favicon/favicon.svg" width="26" height="26" alt="Unitra">
            <span class="sidebar-logo-text">Unitra</span>
        </a>
        <nav class="sidebar-nav">
            <a href="/quick" class="sidebar-link {% if active_page == 'quick' %}active{% endif %}">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                    <path d="M8.5 1.5L2 9.5H8L7.5 14.5L14 6.5H8L8.5 1.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
                Quick
            </a>
            <a href="/project" class="sidebar-link {% if active_page == 'project' %}active{% endif %}">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                    <path d="M2 4.5C2 3.67 2.67 3 3.5 3H6.5L8 5H12.5C13.33 5 14 5.67 14 6.5V11.5C14 12.33 13.33 13 12.5 13H3.5C2.67 13 2 12.33 2 11.5V4.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
                Project
            </a>
            <a href="/ai" class="sidebar-link {% if active_page == 'ai' %}active{% endif %}">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                    <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                AI Enhanced
            </a>
        </nav>
        <a href="/settings" class="sidebar-link sidebar-settings {% if active_page == 'settings' %}active{% endif %}" style="margin-top: auto;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            Settings
        </a>
    </aside>

    <div class="page-content">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
