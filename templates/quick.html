{% extends "base.html" %}
{% block title %}Unitra — Quick Mode{% endblock %}

{% block content %}
<main>
    <header class="page-header">
        <h1 class="page-title">Quick Mode</h1>
        <p class="subtitle">Paste any Python snippet and get pytest tests instantly</p>
    </header>

    <div class="input-section">
        <div class="section-header">
            <label class="section-label">Your Python code</label>
            <div class="examples-row">
                <span class="examples-label">Examples:</span>
                <button class="btn-example" onclick="loadExample(0)">Simple function</button>
                <button class="btn-example" onclick="loadExample(1)">Class</button>
                <button class="btn-example" onclick="loadExample(2)">With exceptions</button>
            </div>
        </div>
        <textarea id="code" placeholder="def add(a, b):&#10;    return a + b"></textarea>
        <div class="actions">
            <button class="btn-primary" onclick="generate()">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M3 8L6.5 11.5L13 5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Generate Tests
            </button>
            <button class="btn-secondary" onclick="openFile()">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M2 4.5C2 3.67 2.67 3 3.5 3H6.5L8 5H12.5C13.33 5 14 5.67 14 6.5V11.5C14 12.33 13.33 13 12.5 13H3.5C2.67 13 2 12.33 2 11.5V4.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
                Open .py File
            </button>
        </div>
    </div>

    <div id="result-section" class="result-section hidden">
        <div class="result-header">
            <label class="section-label">Generated tests</label>
            <span id="meta" class="meta-badge"></span>
        </div>
        <div class="output-actions">
            <button id="btn-copy" class="btn-ghost" onclick="copyOutput()">Copy</button>
            <button id="btn-save" class="btn-ghost" onclick="saveOutput()">Save as .py</button>
            <button id="btn-save-conftest" class="btn-ghost" onclick="saveConftest()" style="display:none;">Save conftest.py</button>
            <button id="btn-run" class="btn-ghost" onclick="runTests()">Run Tests</button>
        </div>
        <div id="output" class="output"></div>
        <pre id="run-result" class="run-result"></pre>
        <button id="btn-copy-run" class="btn-ghost" onclick="copyRunResult()" style="display:none; margin-top:6px;">Copy result</button>
    </div>
</main>
{% endblock %}

{% block scripts %}
<script src="/static/scripts/examples.js"></script>
<script src="/static/scripts/output-actions.js"></script>
<script src="/static/main.js"></script>
{% endblock %}
