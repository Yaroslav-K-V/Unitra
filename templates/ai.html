<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unitra — AI Enhanced</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/favicon.ico">
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back</a>
        <header>
            <div class="logo">
                <img src="/static/favicon/favicon.svg" width="32" height="32" alt="Unitra">
                <span class="logo-text">AI Enhanced</span>
            </div>
            <p class="subtitle">AST analysis + Claude API for smarter edge case tests</p>
        </header>

        <main>
            <div class="input-section">
                <label class="section-label">Your Python code</label>
                <textarea id="code" placeholder="def divide(a, b):&#10;    return a / b"></textarea>
                <div class="actions" style="margin-top:14px;">
                    <button class="btn-primary" onclick="generateAI()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="3" stroke="white" stroke-width="1.8"/>
                            <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                        Generate with AI
                    </button>
                    <button class="btn-secondary" onclick="pickFiles()">Open file(s)</button>
                    <button class="btn-secondary" onclick="pickFolder()">Open folder</button>
                </div>
                <p style="margin-top:12px; font-size:12px; color:#a89f96;">Requires ANTHROPIC_API_KEY in environment</p>
            </div>

            <div id="result-section" class="result-section hidden">
                <div class="result-header">
                    <label class="section-label">Generated tests</label>
                    <span id="meta" class="meta-badge"></span>
                </div>
                <div class="output-actions">
                    <button id="btn-copy" class="btn-ghost" onclick="copyOutput()">Copy</button>
                    <button id="btn-save" class="btn-ghost" onclick="saveOutput()">Save as .py</button>
                </div>
                <div id="output" class="output"></div>
            </div>
        </main>
    </div>
    <script src="/static/scripts/output-actions.js"></script>
    <script src="/static/ai.js"></script>
</body>
</html>
