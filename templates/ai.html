{% extends "base.html" %}
{% block title %}Unitra — AI Enhanced{% endblock %}

{% block content %}
<main>
    <header class="page-header">
        <h1 class="page-title">AI Enhanced</h1>
        <p class="subtitle">AST analysis + OpenAI API for smarter edge case tests</p>
    </header>

    <div class="tab-bar">
        <button class="tab-btn active" data-tab="input" onclick="switchTab('input')">Input</button>
        <button class="tab-btn" data-tab="output" onclick="switchTab('output')">Output</button>
    </div>

    <div class="tab-pane active" data-tab="input">
        <label class="section-label">Your Python code</label>
        <textarea id="code" placeholder="def divide(a, b):&#10;    return a / b"></textarea>
        <div class="actions">
            <button class="btn-primary" onclick="generateAI()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="3" stroke="white" stroke-width="1.8"/>
                    <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
                Generate with AI
            </button>
            <button class="btn-secondary" onclick="pickFiles()">Open file(s)</button>
            <button class="btn-secondary" onclick="pickFolder()">Open folder</button>
        </div>
        <p style="font-size:12px; color:var(--text-faint);">Requires API_KEY in .env</p>
    </div>

    <div class="tab-pane" data-tab="output">
        <div class="output-split">
            <div class="output-main">
                <div class="result-header">
                    <label class="section-label">Generated tests</label>
                    <span id="meta" class="meta-badge"></span>
                </div>
                <div class="output-actions">
                    <button id="btn-copy" class="btn-ghost" onclick="copyOutput()">Copy</button>
                    <button id="btn-save" class="btn-ghost" onclick="saveOutput()">Save as .py</button>
                    <button id="btn-save-conftest" class="btn-ghost" onclick="saveConftest()" style="display:none;">Save conftest.py</button>
                    <button id="btn-run" class="btn-ghost" onclick="runTests()">Run Tests</button>
                </div>
                <div id="output" class="output"></div>
            </div>
            <div class="split-resizer" id="split-resizer"></div>
            <div class="run-panel">
                <div class="run-panel-header">
                    <span class="section-label">Run result</span>
                    <button id="btn-copy-run" class="btn-ghost" onclick="copyRunResult()" style="display:none;">Copy</button>
                </div>
                <pre id="run-result" class="run-result"></pre>
            </div>
        </div>
    </div>
</main>
{% endblock %}

{% block scripts %}
<script src="/static/scripts/output-actions.js"></script>
<script src="/static/ai.js"></script>
{% endblock %}
